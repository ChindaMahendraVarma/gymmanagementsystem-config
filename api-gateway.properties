spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=member-service
spring.cloud.gateway.routes[0].uri=lb://member-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/members/**

spring.cloud.gateway.routes[1].id=trainer-service
spring.cloud.gateway.routes[1].uri=lb://trainer-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/trainers/**

spring.cloud.gateway.routes[2].id=subscription-service
spring.cloud.gateway.routes[2].uri=lb://subscription-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/subscriptions/**,/plans/**

spring.cloud.gateway.routes[3].id=attendance-service
spring.cloud.gateway.routes[3].uri=lb://attendance-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/attendance/**

spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://payment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/payments/**

spring.boot.admin.client.url=http://localhost:8090
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
